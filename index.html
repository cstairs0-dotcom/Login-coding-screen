<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Register - Night Backdrop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #304ffe 0, #0d1b2a 40%, #000814 100%);
      color: #e0e7ff;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -50%;
      background-image:
        radial-gradient(2px 2px at 20% 10%, rgba(255,255,255,0.6) 0, transparent 50%),
        radial-gradient(1.5px 1.5px at 80% 30%, rgba(255,255,255,0.4) 0, transparent 50%),
        radial-gradient(1.5px 1.5px at 50% 70%, rgba(255,255,255,0.5) 0, transparent 50%),
        radial-gradient(2px 2px at 10% 80%, rgba(255,255,255,0.3) 0, transparent 50%),
        radial-gradient(1.5px 1.5px at 90% 60%, rgba(255,255,255,0.5) 0, transparent 50%);
      opacity: 0.6;
      z-index: -2;
    }

    body::after {
      animation: drift 80s linear infinite;
      opacity: 0.3;
    }

    @keyframes drift {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(200px, -200px, 0); }
    }

    .wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      padding: 2rem;
    }

    .glass-card {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
      background: rgba(10, 17, 40, 0.85);
      border-radius: 24px;
      border: 1px solid rgba(120, 144, 255, 0.4);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.7);
      overflow: hidden;
      backdrop-filter: blur(16px);
    }

    .panel-forms {
      padding: 2.5rem 2.75rem;
    }

    .panel-forms h2 {
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
    }

    .panel-forms p.subtitle {
      font-size: 0.95rem;
      color: #a5b4fc;
      margin-bottom: 2rem;
    }

    .tabs {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
      border-radius: 999px;
      padding: 0.25rem;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(129, 140, 248, 0.4);
    }

    .tab-btn {
      flex: 1;
      padding: 0.55rem 0.75rem;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: #a5b4fc;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease, transform 0.1s ease;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #4c6fff, #7c3aed);
      color: #f9fafb;
      box-shadow: 0 6px 14px rgba(79, 70, 229, 0.6);
    }

    .tab-btn:active {
      transform: scale(0.97);
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #a5b4fc;
      margin-bottom: 0.35rem;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 0.9rem;
      padding-right: 2.3rem;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 255, 0.5);
      background: rgba(15, 23, 42, 0.6);
      color: #e5e7eb;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input::placeholder {
      color: #6b7280;
    }

    input:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.6);
      background: rgba(15, 23, 42, 0.9);
    }

    .toggle-password {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
      color: #9ca3af;
      cursor: pointer;
      user-select: none;
    }

    .inline-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.3rem;
      font-size: 0.8rem;
    }

    .inline-row label span {
      text-transform: none;
      letter-spacing: normal;
      color: #e5e7eb;
      font-size: 0.8rem;
    }

    .inline-row a {
      color: #a5b4fc;
      text-decoration: none;
      font-size: 0.8rem;
    }

    .inline-row a:hover {
      text-decoration: underline;
    }

    .primary-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #f9fafb;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(79, 70, 229, 0.7);
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.2s ease;
    }

    .primary-btn:hover {
      filter: brightness(1.05);
    }

    .primary-btn:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.5);
    }

    .alt-text {
      text-align: center;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .alt-text a {
      color: #a5b4fc;
      text-decoration: none;
      font-weight: 500;
    }

    .alt-text a:hover {
      text-decoration: underline;
    }

    .form {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .form.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel-visual {
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at 20% 10%, #7dd3fc 0, transparent 40%),
                  radial-gradient(circle at 80% 20%, #4c6fff 0, transparent 45%),
                  radial-gradient(circle at 50% 90%, #1e293b 0, #020617 60%);
      padding: 2.1rem 2.3rem;
      color: #e5e7eb;
    }

    .moon {
      position: absolute;
      top: 12%;
      right: 15%;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fefce8 0, #fde68a 35%, #facc15 60%, #c4a300 100%);
      box-shadow: 0 0 30px rgba(250, 250, 210, 0.7);
    }

    .cloud {
      position: absolute;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 999px;
      filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.6));
      opacity: 0.9;
    }

    .cloud:nth-child(1) {
      width: 110px;
      height: 36px;
      top: 36%;
      right: 10%;
      animation: float 16s ease-in-out infinite;
    }

    .cloud:nth-child(2) {
      width: 90px;
      height: 30px;
      top: 52%;
      right: 32%;
      animation: float 22s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-12px); }
    }

    .cityline {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 110px;
      background: linear-gradient(to top, #020617 0, #020617 30%, transparent 100%);
      clip-path: polygon(
        0% 100%, 0% 40%,
        7% 40%, 7% 20%,
        15% 20%, 15% 45%,
        23% 45%, 23% 10%,
        32% 10%, 32% 55%,
        42% 55%, 42% 25%,
        52% 25%, 52% 50%,
        60% 50%, 60% 18%,
        70% 18%, 70% 42%,
        82% 42%, 82% 30%,
        92% 30%, 92% 50%,
        100% 50%, 100% 100%
      );
      opacity: 0.9;
    }

    .panel-visual-content {
      position: relative;
      z-index: 1;
      max-width: 240px;
      margin-top: 1.2rem;
    }

    .panel-visual-content h3 {
      font-size: 1.4rem;
      margin-bottom: 0.4rem;
    }

    .panel-visual-content p {
      font-size: 0.9rem;
      color: #cbd5f5;
      margin-bottom: 1.4rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.22rem 0.75rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(129, 140, 248, 0.6);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin-bottom: 0.55rem;
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #4ade80;
      box-shadow: 0 0 10px rgba(74, 222, 128, 0.9);
    }

    .stars-row {
      display: flex;
      gap: 0.15rem;
      margin-bottom: 0.45rem;
    }

    .star {
      width: 10px;
      height: 10px;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      background: #fde68a;
      filter: drop-shadow(0 0 5px rgba(250, 250, 210, 0.7));
    }

    .small-text {
      font-size: 0.78rem;
      color: #9ca3af;
    }

    @media (max-width: 800px) {
      .glass-card {
        grid-template-columns: 1fr;
      }

      .panel-visual {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .panel-forms {
        padding: 1.8rem 1.5rem 2rem;
      }

      .panel-forms h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="glass-card">
      <!-- LEFT: Forms -->
      <div class="panel-forms">
        <h2 id="form-title">Welcome back</h2>
        <p class="subtitle" id="form-subtitle">Sign in to continue your night session.</p>

        <div class="tabs">
          <button class="tab-btn active" data-target="login-form">Login</button>
          <button class="tab-btn" data-target="register-form">Register</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="form active">
          <div class="form-group">
            <label for="login-email">Email</label>
            <div class="input-wrapper">
              <input type="email" id="login-email" placeholder="you@example.com" required />
            </div>
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="login-password" placeholder="••••••••" required />
              <span class="toggle-password" data-target="login-password">Show</span>
            </div>
          </div>

          <div class="inline-row">
            <label>
              <input type="checkbox" id="remember-me" />
              <span>Remember me</span>
            </label>
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit" class="primary-btn">Log in</button>
          <p class="alt-text">New here? <a href="#" id="switch-to-register">Create an account</a></p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="form">
          <div class="form-group">
            <label for="reg-name">Full name</label>
            <div class="input-wrapper">
              <input type="text" id="reg-name" placeholder="John Doe" required />
            </div>
          </div>

          <div class="form-group">
            <label for="reg-email">Email</label>
            <div class="input-wrapper">
              <input type="email" id="reg-email" placeholder="you@example.com" required />
            </div>
          </div>

          <div class="form-group">
            <label for="reg-password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="reg-password" placeholder="Create a password" required />
              <span class="toggle-password" data-target="reg-password">Show</span>
            </div>
          </div>

          <div class="form-group">
            <label for="reg-confirm">Confirm password</label>
            <div class="input-wrapper">
              <input type="password" id="reg-confirm" placeholder="Repeat your password" required />
              <span class="toggle-password" data-target="reg-confirm">Show</span>
            </div>
          </div>

          <div class="inline-row" style="margin-bottom: 1rem;">
            <label>
              <input type="checkbox" required />
              <span>I agree to the terms</span>
            </label>
          </div>

          <button type="submit" class="primary-btn">Create account</button>
          <p class="alt-text">Already have an account? <a href="#" id="switch-to-login">Sign in</a></p>
        </form>
      </div>

      <!-- RIGHT: Night Visual -->
      <div class="panel-visual">
        <div class="moon"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cityline"></div>

        <div class="panel-visual-content">
          <div class="pill">
            <span class="pill-dot"></span>
            Night Mode Active
          </div>

          <div class="stars-row">
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
          </div>

          <h3>Sign in under the stars</h3>
          <p>
            A calm, focused space for late-night sessions. Keep your data secure while
            the city sleeps.
          </p>
          <p class="small-text">
            
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- Tab switching (Login / Register) ---
    const tabButtons = document.querySelectorAll('.tab-btn');
    const forms = document.querySelectorAll('.form');
    const formTitle = document.getElementById('form-title');
    const formSubtitle = document.getElementById('form-subtitle');

    function activateTab(targetId) {
      forms.forEach(form => {
        form.classList.toggle('active', form.id === targetId);
      });

      tabButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.target === targetId);
      });

      if (targetId === 'login-form') {
        formTitle.textContent = 'Welcome back';
        formSubtitle.textContent = 'Sign in to continue your night session.';
      } else {
        formTitle.textContent = 'Create your account';
        formSubtitle.textContent = 'Join the night crew and keep everything in sync.';
      }
    }

    tabButtons.forEach(button => {
      button.addEventListener('click', () => {
        activateTab(button.dataset.target);
      });
    });

    // Text links to switch
    document.getElementById('switch-to-register').addEventListener('click', e => {
      e.preventDefault();
      activateTab('register-form');
    });

    document.getElementById('switch-to-login').addEventListener('click', e => {
      e.preventDefault();
      activateTab('login-form');
    });

    // --- Toggle password visibility ---
    const toggles = document.querySelectorAll('.toggle-password');

    toggles.forEach(toggle => {
      toggle.addEventListener('click', () => {
        const targetId = toggle.dataset.target;
        const input = document.getElementById(targetId);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        toggle.textContent = isPassword ? 'Hide' : 'Show';
      });
    });

    // --- Simple localStorage-based auth (demo only) ---
    const registerForm = document.getElementById('register-form');
    const loginForm = document.getElementById('login-form');
    const rememberMeCheckbox = document.getElementById('remember-me');

    function saveUserToStorage(name, email, password) {
      const user = { name, email, password };
      localStorage.setItem('demoUser', JSON.stringify(user));
    }

    function getUserFromStorage() {
      const data = localStorage.getItem('demoUser');
      if (!data) return null;
      try {
        return JSON.parse(data);
      } catch (e) {
        return null;
      }
    }

    function saveRememberedLogin(email, password) {
      const remembered = { email, password };
      localStorage.setItem('rememberedLogin', JSON.stringify(remembered));
    }

    function clearRememberedLogin() {
      localStorage.removeItem('rememberedLogin');
    }

    function loadRememberedLogin() {
      const data = localStorage.getItem('rememberedLogin');
      if (!data) return;
      try {
        const { email, password } = JSON.parse(data);
        const loginEmailInput = document.getElementById('login-email');
        const loginPasswordInput = document.getElementById('login-password');
        loginEmailInput.value = email || '';
        loginPasswordInput.value = password || '';
        rememberMeCheckbox.checked = true;
      } catch (e) {
        // ignore parse errors
      }
    }

    // Load remembered login on page load
    loadRememberedLogin();

    // Handle registration
    registerForm.addEventListener('submit', e => {
      e.preventDefault();

      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (password !== confirm) {
        alert('Passwords do not match.');
        return;
      }

      if (!name || !email || !password) {
        alert('Please fill in all fields.');
        return;
      }

      saveUserToStorage(name, email, password);
      alert('Account created! You can now log in.');

      // Pre-fill login email
      document.getElementById('login-email').value = email;
      document.getElementById('login-password').value = '';

      activateTab('login-form');
    });

    // Handle login
    loginForm.addEventListener('submit', e => {
      e.preventDefault();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      const storedUser = getUserFromStorage();

      if (!storedUser) {
        alert('No registered user found. Please create an account first.');
        return;
      }

      if (email === storedUser.email && password === storedUser.password) {
        // Correct login
        if (rememberMeCheckbox.checked) {
          saveRememberedLogin(email, password);
        } else {
          clearRememberedLogin();
        }

        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid email or password.');
      }
    });
  </script>
</body>
</html>
